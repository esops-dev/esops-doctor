rule: deprecated_realms
cases:
  - name: empty realm list passes
    expect: pass
    data: []

  - name: only supported realms passes
    expect: pass
    data:
      - name: native1
        type: native
        order: 0
        enabled: true
      - name: ldap1
        type: ldap
        order: 1
        enabled: true

  - name: deprecated realm fails
    expect: fail
    data:
      - name: native1
        type: native
        order: 0
        enabled: true
      - name: legacy
        type: file
        order: 1
        enabled: false
        deprecated: true
