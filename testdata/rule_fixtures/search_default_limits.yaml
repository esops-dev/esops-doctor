rule: search_default_limits
cases:
  - name: empty cluster settings pass
    expect: pass
    data:
      persistent: {}
      transient: {}

  - name: defaults left in place pass
    expect: pass
    data:
      persistent:
        "action.destructive_requires_name": "true"
      transient: {}

  - name: max_buckets raised but below threshold passes
    expect: pass
    data:
      persistent:
        "search.max_buckets": "100000"
      transient: {}

  - name: max_open_scroll_context modestly raised passes
    expect: pass
    data:
      persistent: {}
      transient:
        "search.max_open_scroll_context": "1000"

  - name: max_buckets at safety threshold passes
    expect: pass
    data:
      persistent:
        "search.max_buckets": "249999"
      transient: {}

  - name: max_buckets pushed to 500k flags
    expect: fail
    data:
      persistent:
        "search.max_buckets": "500000"
      transient: {}

  - name: max_open_scroll_context pushed to 5000 flags
    expect: fail
    data:
      persistent: {}
      transient:
        "search.max_open_scroll_context": "5000"

  - name: both raised together flag
    expect: fail
    data:
      persistent:
        "search.max_buckets": "1000000"
      transient:
        "search.max_open_scroll_context": "10000"
