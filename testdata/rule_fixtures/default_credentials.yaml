rule: default_credentials
cases:
  - name: no users block passes
    expect: pass
    data:
      tls: { scheme: https }
      status: { dialect: elasticsearch, enabled: true }

  - name: every reserved user has a rotation timestamp
    expect: pass
    data:
      tls: { scheme: https }
      status: { dialect: elasticsearch, enabled: true }
      users:
        - username: elastic
          enabled: true
          reserved: true
          password_changed_at: "2024-08-15T10:00:00Z"
        - username: kibana_system
          enabled: true
          reserved: true
          password_changed_at: "2024-09-01T09:30:00Z"

  - name: disabled reserved users don't matter
    expect: pass
    data:
      status: { dialect: elasticsearch, enabled: true }
      users:
        - username: kibana_system
          enabled: false
          reserved: true
          # never rotated, but disabled — not a foothold

  - name: non-reserved users without timestamp don't trigger
    expect: pass
    data:
      status: { dialect: elasticsearch, enabled: true }
      users:
        - username: app_writer
          enabled: true
          reserved: false

  - name: elastic user without rotation timestamp flags
    expect: fail
    data:
      status: { dialect: elasticsearch, enabled: true }
      users:
        - username: elastic
          enabled: true
          reserved: true
        - username: kibana_system
          enabled: true
          reserved: true
          password_changed_at: "2024-09-01T09:30:00Z"

  - name: empty timestamp string flags
    expect: fail
    data:
      status: { dialect: elasticsearch, enabled: true }
      users:
        - username: elastic
          enabled: true
          reserved: true
          password_changed_at: ""
