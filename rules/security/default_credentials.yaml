checks:
  - id: default_credentials
    name: Built-in user shows no password change
    category: security
    severity: error
    description: >
      The cluster's reserved (built-in) accounts ship with documented
      default passwords. The cluster's password_changed_at timestamp
      is the read-only signal that the password has been rotated;
      empty means either no rotation has happened or the cluster
      version doesn't surface the field. Restricted to Elasticsearch
      because the OpenSearch security plugin does not expose this
      timestamp on any supported version (the field would be empty
      for every user, false-positiving the whole audit).
    probe: security_audit
    condition: |
      !has(self.users) ||
      self.users.all(u,
        !(has(u.reserved) && u.reserved == true) ||
        !(has(u.enabled) && u.enabled == true) ||
        (has(u.password_changed_at) && u.password_changed_at != '')
      )
    count_expression: |
      has(self.users) ?
        size(self.users.filter(u,
          (has(u.reserved) && u.reserved == true) &&
          (has(u.enabled) && u.enabled == true) &&
          (!has(u.password_changed_at) || u.password_changed_at == '')
        )) : 0
    message: '{{count}} reserved user(s) show no password rotation timestamp.'
    remediation:
      command: Rotate the reserved user passwords via the security API; the cluster will populate password_changed_at on the next read
      doc_url: https://www.elastic.co/guide/en/elasticsearch/reference/current/security-api-change-password.html
      esops_commands:
        - esops ops audit
    tags: [prod, security, framework:cis, framework:pci]
    dialects: [elasticsearch]
    affected_versions: ["7.x", "8.x", "9.x"]
    effort: low
