checks:
  - id: heap_size
    name: JVM heap size configuration
    category: resource_sanity
    severity: critical
    description: >
      JVM heap should be ~50% of physical RAM and capped at 31 GiB so
      that compressed object pointers stay enabled. Nodes that do not
      report JVM info (coordinating-only or stripped builds) are
      skipped via the !has() guard.
    probe: node_stats
    condition: |
      size(self) > 0 &&
      self.all(node,
        !has(node.jvm) || !has(node.jvm.heap) || !has(node.jvm.heap.max_bytes) ||
        (
          int(node.jvm.heap.max_bytes) <= 31 * 1024 * 1024 * 1024 &&
          (
            !has(node.os) || !has(node.os.total_physical_memory_bytes) ||
            int(node.jvm.heap.init_bytes) * 2 <= int(node.os.total_physical_memory_bytes)
          )
        )
      )
    message: Heap size misconfigured on {{count}} nodes.
    remediation:
      command: Update JVM options and restart nodes
      doc_url: https://www.elastic.co/guide/en/elasticsearch/reference/current/heap-size.html
    tags: [prod, performance]
    dialects: [elasticsearch, opensearch]
    affected_versions: ["7.x", "8.x", "9.x", "1.x", "2.x", "3.x"]
    effort: medium
