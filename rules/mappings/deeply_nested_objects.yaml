checks:
  - id: deeply_nested_objects
    name: Mapping nests objects more than 4 levels deep
    category: mappings
    severity: warn
    description: >
      Deeply-nested object mappings make every field-resolution walk
      slower and push the per-document field count up sharply (each
      sub-object at depth N multiplies the leaf count). The reference
      guidance is ≤3–4 levels of nested objects; doctor flags any
      index whose mapping carries a path through five `properties`
      chains (i.e. four nested objects beneath the root). System
      indices are excluded — their schema is the cluster's call.
    probe: mappings
    condition: |
      size(self) == 0 ||
      self.all(idx,
        !has(idx.name) ||
        idx.name.startsWith('.') ||
        !has(idx.properties) ||
        !idx.properties.exists(a,
          has(idx.properties[a].properties) &&
          idx.properties[a].properties.exists(b,
            has(idx.properties[a].properties[b].properties) &&
            idx.properties[a].properties[b].properties.exists(c,
              has(idx.properties[a].properties[b].properties[c].properties) &&
              idx.properties[a].properties[b].properties[c].properties.exists(d,
                has(idx.properties[a].properties[b].properties[c].properties[d].properties) &&
                size(idx.properties[a].properties[b].properties[c].properties[d].properties) > 0
              )
            )
          )
        )
      )
    count_expression: |
      size(self.filter(idx,
        has(idx.name) && !idx.name.startsWith('.') &&
        has(idx.properties) &&
        idx.properties.exists(a,
          has(idx.properties[a].properties) &&
          idx.properties[a].properties.exists(b,
            has(idx.properties[a].properties[b].properties) &&
            idx.properties[a].properties[b].properties.exists(c,
              has(idx.properties[a].properties[b].properties[c].properties) &&
              idx.properties[a].properties[b].properties[c].properties.exists(d,
                has(idx.properties[a].properties[b].properties[c].properties[d].properties) &&
                size(idx.properties[a].properties[b].properties[c].properties[d].properties) > 0
              )
            )
          )
        )
      ))
    message: '{{count}} index/indices have mapping nested deeper than 4 levels.'
    remediation:
      command: Flatten the deeply-nested objects into named scalar fields, or move the structure into a child index referenced by id
      doc_url: https://www.elastic.co/guide/en/elasticsearch/reference/current/mapping-settings-limit.html
      esops_commands:
        - esops index template
        - esops migrate reindex
    tags: [prod, mappings]
    dialects: [elasticsearch, opensearch]
    affected_versions: ["7.x", "8.x", "9.x", "1.x", "2.x", "3.x"]
    effort: high
