name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: sigstore/cosign-installer@v3

      - uses: anchore/sbom-action/download-syft@v0

      - name: Resolve esops-go module version
        id: esops
        run: |
          v=$(go list -m -f '{{.Version}}' github.com/esops-dev/esops-go 2>/dev/null || echo unknown)
          echo "version=${v}" >>"$GITHUB_OUTPUT"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ESOPS_MODULE_VERSION: ${{ steps.esops.outputs.version }}

      - name: Compute release subjects for provenance
        id: hash
        working-directory: dist
        run: |
          echo "hashes=$(base64 -w0 < checksums.txt)" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA Provenance
    needs: [goreleaser]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
      private-repository: true
