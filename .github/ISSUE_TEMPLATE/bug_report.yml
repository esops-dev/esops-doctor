name: Bug report
description: Report a defect in esops-doctor
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, command line, config snippet.
      render: shell
    validations:
      required: true

  - type: textarea
    id: version
    attributes:
      label: Version output
      description: Output of `esops-doctor version --output json`.
      render: json
    validations:
      required: true

  - type: input
    id: cluster
    attributes:
      label: Cluster
      description: Elasticsearch / OpenSearch + version.
    validations:
      required: true
