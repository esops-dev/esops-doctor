changelog:
  exclude:
    labels: [skip-changelog]
  categories:
    - title: Breaking Changes
      labels: [breaking]
    - title: Security
      labels: [security]
    - title: Features
      labels: [enhancement]
    - title: Bug Fixes
      labels: [bug]
    - title: Dependencies
      labels: [dependencies]
    - title: Documentation
      labels: [documentation]
    - title: Other Changes
      labels: ['*']
