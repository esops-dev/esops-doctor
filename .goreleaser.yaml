version: 2

project_name: esops-doctor

before:
  hooks:
    - go mod tidy

builds:
  - id: esops-doctor
    main: ./cmd/esops-doctor
    binary: esops-doctor
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/esops-dev/esops-doctor/internal/version.Version={{.Version}}
      - -X github.com/esops-dev/esops-doctor/internal/version.Commit={{.ShortCommit}}
      - -X github.com/esops-dev/esops-doctor/internal/version.Date={{.Date}}
      - -X github.com/esops-dev/esops-doctor/internal/version.EsopsModule={{.Env.ESOPS_MODULE_VERSION}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - completions/*

nfpms:
  - id: packages
    package_name: esops-doctor
    vendor: esops-dev
    homepage: https://github.com/esops-dev/esops-doctor
    maintainer: esops-dev <ops@esops.dev>
    description: |-
      Read-only diagnostic linter for self-managed Elasticsearch and OpenSearch
      clusters.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: completions/esops-doctor.bash
        dst: /usr/share/bash-completion/completions/esops-doctor
      - src: completions/_esops-doctor
        dst: /usr/share/zsh/site-functions/_esops-doctor
      - src: completions/esops-doctor.fish
        dst: /usr/share/fish/vendor_completions.d/esops-doctor.fish

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# SBOMs in both CycloneDX and SPDX so downstream auditors can pick the
# format their toolchain ingests. Syft is shipped via the workflow's
# anchore/sbom-action setup; the goreleaser-side config here just tells
# it which artefacts to attach the documents to.
sboms:
  - id: cyclonedx
    artifacts: archive
    documents:
      - "${artifact}.cyclonedx.sbom.json"
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
  - id: spdx
    artifacts: archive
    documents:
      - "${artifact}.spdx.sbom.json"
    args: ["$artifact", "--output", "spdx-json=$document"]

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

release:
  prerelease: auto
  draft: false
