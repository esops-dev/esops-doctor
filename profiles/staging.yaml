name: staging
description: Pre-production. Same selection as prod, one severity tier softer.

severity_overrides:
  heap_size: error
  tls_transport: error
  tls_insecure_skip_verify: error
  node_to_node_encryption: error
  http_tls: error
  anonymous_access: error
  security_disabled: error
  snapshot_repository_configured: error
  unassigned_shards: error
  bootstrap_memory_lock: error
  default_credentials: error
  destructive_requires_name: error
  permissive_superuser_role: warn
  dedicated_master_nodes: warn
  audit_logging_enabled: warn
  deprecated_realms: warn
  stale_api_keys: warn
  stale_service_tokens: warn

skip_tags: []
include_tags: []
rule_ids: []
