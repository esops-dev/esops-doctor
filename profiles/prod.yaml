name: prod
description: Production scans. Promotes hygiene checks toward critical.

severity_overrides:
  heap_size: critical
  tls_transport: critical
  tls_insecure_skip_verify: critical
  node_to_node_encryption: critical
  http_tls: critical
  anonymous_access: critical
  security_disabled: critical
  snapshot_repository_configured: critical
  unassigned_shards: critical
  bootstrap_memory_lock: critical
  default_credentials: critical
  destructive_requires_name: critical
  permissive_superuser_role: error
  dedicated_master_nodes: error
  disk_watermarks: error
  max_file_descriptors_low: error
  audit_logging_enabled: error
  deprecated_realms: error
  stale_api_keys: error
  stale_service_tokens: error
  recent_audit_warnings: warn
  untested_restore: critical
  snapshot_slo_age: critical
  retention_gap: error
  deprecated_field_types: error
  unbounded_keyword_cardinality: warn
  mapping_template_drift: warn

skip_tags: []
include_tags: []
